server:
  port: 8080

spring:
  application:
    name: ai-fms-backend

  # R2DBC PostgreSQL
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/aifms
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m

  # Flyway (uses JDBC, standard approach)
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/aifms
    user: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    locations: filesystem:../database/migration
    baseline-on-migrate: true

  # Redis Reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s

# MinIO Object Storage
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:aifms}

# Logging
logging:
  level:
    com.aifms: DEBUG
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.security: DEBUG

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  webjars:
    prefix: ""

# ── AI Configuration ──
ai:
  llm:
    base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:deepseek-chat}
    temperature: 0.3
  embedding:
    base-url: ${EMBEDDING_BASE_URL:https://api.openai.com}
    api-key: ${EMBEDDING_API_KEY:}
    model: ${EMBEDDING_MODEL:text-embedding-3-large}
  ocr:
    provider: ${OCR_PROVIDER:mock}
    api-key: ${OCR_API_KEY:}
  mcp:
    servers:
      filesystem:
        command: npx
        args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
